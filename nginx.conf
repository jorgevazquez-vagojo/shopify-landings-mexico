server {
    listen 80;
    server_name _;
    charset utf-8;

    # noindex — preview only
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # robots.txt
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }

    # Headless landing
    location /headless {
        alias /srv/headless;
        try_files $uri $uri/ /headless/index.html;
        index index.html;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    }

    # System landing
    location /system {
        alias /srv/system;
        try_files $uri $uri/ /system/index.html;
        index index.html;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    }

    # Root redirect
    location = / {
        return 302 /system;
    }

    # ── Sarah Widget proxy ──────────────────────────────────────
    # Proxies Sarah's widget assets, API and WebSocket through this
    # nginx so the landing pages only need one public URL.

    location /widget/ {
        proxy_pass http://host.docker.internal:9456/widget/;
        proxy_set_header Host $host;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:9456/api/;
        proxy_set_header Host $host;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /ws/ {
        proxy_pass http://host.docker.internal:9456/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript text/javascript;
}
